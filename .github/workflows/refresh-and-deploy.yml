name: Refresh content & deploy

on:
  schedule:
    # 每周三、周日 UTC 0:00（北京 8:00）各一次
    - cron: '0 0 * * 0,3'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 需要回推 inbox.json

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python deps
        run: pip install -r pipeline/requirements.txt

      - name: Install Node deps
        run: npm ci

      - name: Run pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python pipeline/fetch_and_classify.py

      - name: Build site
        env:
          ASTRO_BASE: '/'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=ai-org-site --branch=main

      - name: Commit updated inbox.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/inbox.json
          git diff --staged --quiet || git commit -m "chore: refresh inbox via pipeline [skip ci]"
          git push
